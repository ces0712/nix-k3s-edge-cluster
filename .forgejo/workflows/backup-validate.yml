name: backup-validate

on:
  workflow_dispatch:
  schedule:
    - cron: '30 8 * * 1'

jobs:
  backup-validate:
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate backup readiness
        shell: bash
        env:
          TARGET_HOST: ${{ secrets.EDGE_TARGET_HOST }}
          DEPLOY_USER: nixos
          IDENTITY_FILE: ${{ vars.EDGE_IDENTITY_FILE }}
        run: |
          just backup-validate
